interface ButtonProps {
  children: React.ReactNode;
  onClick?: () => void;
  variant?: 'primary' | 'secondary';
}

export const Button: React.FC<ButtonProps> = ({
  children,
  onClick,
  variant = 'primary'
}) => {
  return (
    <button
      className={\`btn btn-\${variant}\`}
      onClick={onClick}
    >
      {children}
    </button>
  );
};`},{id:"4",name:"Input.tsx",type:"file",language:"typescript",content:`import React from 'react';

interface InputProps {
  value: string;
  onChange: (value: string) => void;
  placeholder?: string;
  type?: 'text' | 'password' | 'email';
}

export const Input: React.FC<InputProps> = ({
  value,
  onChange,
  placeholder,
  type = 'text'
}) => {
  return (
    <input
      type={type}
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      className="input"
    />
  );
};`}]},{id:"5",name:"App.tsx",type:"file",language:"typescript",content:`import React from 'react';

  const [count, setCount] = React.useState(0);

  return (
    <div className="app">
      <h1>VSCode Clone</h1>
      <p>Count: {count}</p>
      <Button onClick={() => setCount(c => c + 1)}>
        Increment
      </Button>
      <Input value="" onChange={() => {}} placeholder="Enter text..." />
    </div>
  );
}

export default App;`},{id:"6",name:"main.tsx",type:"file",language:"typescript",content:`import React from 'react';

  return classes.filter(Boolean).join(' ');
};

export const debounce = <T extends (...args: any[]) => any>(
  func: T,
  wait: number
): ((...args: Parameters<T>) => void) => {
  let timeout: NodeJS.Timeout;
  return (...args: Parameters<T>) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => func(...args), wait);
  };
};`}]},{id:"9",name:"public",type:"folder",isOpen:!1,children:[{id:"10",name:"index.html",type:"file",language:"html",content:`<!DOCTYPE html>
